services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      UPLOAD_DIR: /app/uploads
      CORS_ORIGINS: '["${FRONTEND_ORIGIN}"]'
      PORT: ${PORT:-5050}
      CLIENT_DIR: /app/client
      API_SECRET_KEY: ${API_SECRET_KEY}
    ports:
      - "${PORT:-5050}:${PORT:-5050}"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${PORT:-5050}/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    environment:
      SERVER_URL: ${WORKER_SERVER_URL:-http://server:5050}
      API_SECRET_KEY: ${API_SECRET_KEY}
      WORKER_NAME: ${WORKER_NAME:-worker}
      WORKER_MAX_JOBS: ${WORKER_MAX_JOBS:-4}
      GODOT_SERVER_BIN: ${GODOT_SERVER_BIN:-/app/server_build/AstroSwarm_Linux.x86_64}
      # GODOT_PCK only needed if GODOT_SERVER_BIN is a plain Godot binary with a separate pack.
      GODOT_PCK: ${GODOT_PCK:-}
      EVAL_TIMEOUT_SECONDS: ${EVAL_TIMEOUT_SECONDS:-1800}
      EVAL_FIXED_FPS: ${EVAL_FIXED_FPS:-60}
    depends_on:
      server:
        condition: service_healthy
    volumes:
      - worker_data:/data
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  pgdata:
  uploads:
  worker_data:
